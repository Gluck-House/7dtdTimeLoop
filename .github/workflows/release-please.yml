name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release-please:
    uses: "Gluck-House/7dtd-mod-infra/.github/workflows/reusable-release-please.yml@main"
    secrets: inherit

  release-assets:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    uses: "Gluck-House/7dtd-mod-infra/.github/workflows/reusable-release.yml@main"
    secrets: inherit
    with:
      project_name: "TimeLoop"
      artifact_folder: "TimeLoop"
      release_tag: ${{ needs.release-please.outputs.tag_name }}
